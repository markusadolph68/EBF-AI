services:
  app:
    build:
      context: ./app
    container_name: ebf-ai-mvp-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./data:/data
    depends_on:
      - chroma
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chroma:
    image: chromadb/chroma:latest
    container_name: ebf-ai-mvp-chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./data/chroma:/data
