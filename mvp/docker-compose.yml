services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ebf-ai-open-webui
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - ./data/openwebui:/app/backend/data
    environment:
      WEBUI_NAME: "${WEBUI_NAME:-EBF AI}"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:-ebf-ai-local-pilot}"
      DEFAULT_LOCALE: "${DEFAULT_LOCALE:-de-DE}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - chroma

  chroma:
    image: chromadb/chroma:latest
    container_name: ebf-ai-chroma
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
