<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="brand"><span>EBF</span> AI MVP</div>
        <div class="row">
          {% if current_user %}
            <div class="muted">Angemeldet als {{ current_user.username }}</div>
            <form action="/logout" method="post">
              <button class="button secondary" type="submit">Logout</button>
            </form>
          {% endif %}
        </div>
      </div>

      {% if flash %}
        <div class="flash {{ flash.level }}">{{ flash.message }}</div>
      {% endif %}

      {% block content %}{% endblock %}
    </div>
  </body>
  </html>
